<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小怪獸遺傳實驗室 - 平板優化版</title>
    <style>
        :root { --primary-color: #8e44ad; --dad-color: #3498db; --mom-color: #e74c3c; }
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #eef2f5; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; touch-action: manipulation; }
        
        /* 頂部控制列 - 平板更友善 */
        .top-bar { width: 100%; max-width: 1000px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: white; padding: 10px 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); box-sizing: border-box; }
        
        .lab-container { width: 100%; max-width: 1100px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        
        .row { display: flex; justify-content: center; align-items: flex-start; width: 100%; gap: 10px; flex-wrap: nowrap; }
        
        .panel { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 33%; position: relative; }
        
        /* 細胞大小調整為平板適中 */
        .cell { width: 220px; height: 220px; border-radius: 50%; border: 4px solid #333; background: white; position: relative; box-shadow: inset 0 0 15px rgba(0,0,0,0.1); z-index: 10; }
        .label { font-size: 18px; font-weight: bold; color: #2c3e50; padding: 5px 15px; border-bottom: 3px solid var(--primary-color); margin-bottom: 5px; }
        
        .gamete-container { position: relative; display: flex; justify-content: center; align-items: center; width: 100%; height: 180px; }

        .sperm-shape { 
            width: 90px; height: 110px; border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; 
            border: 3px solid var(--dad-color); background: rgba(255,255,255,0.8); position: relative; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            gap: 10px; transform: rotate(90deg); transition: 1s;
        }
        .sperm-shape::after { content: ''; position: absolute; bottom: -30px; left: 50%; width: 8px; height: 40px; background: var(--dad-color); border-radius: 0 0 5px 5px; transform: translateX(-50%); }

        .egg-shape { 
            width: 150px; height: 150px; border-radius: 50%; border: 4px solid var(--mom-color); 
            background: rgba(255,255,255,0.8); position: relative; display: flex; justify-content: center; align-items: center; 
            gap: 5px; transition: 1s;
        }

        .chromosome { position: absolute; border-radius: 8px; cursor: grab; display: flex; flex-direction: column; justify-content: space-around; align-items: center; border: 1px solid rgba(0,0,0,0.2); z-index: 20; }
        .chromosome.faded { opacity: 0.2; cursor: default; z-index: 5; pointer-events: none; }

        /* 修正精子排列：取消旋轉帶來的鏡像感 */
        .gamete-container .chromosome { position: relative !important; top: auto !important; left: auto !important; margin: 0 !important; transform: scale(0.5) !important; z-index: 30; }
        .sperm-shape .chromosome { transform: scale(0.5) rotate(-90deg) !important; }
        
        .long { width: 14px; height: 100px; } 
        .mid { width: 14px; height: 70px; } 
        .short { width: 14px; height: 45px; }
        .gene-site { width: 80%; height: 2px; background: rgba(0,0,0,0.3); position: relative; }
        .gene-label { position: absolute; top: -8px; font-size: 10px; font-weight: bold; text-shadow: 1px 1px 0 #fff; white-space: nowrap; }
        .label-right { right: -18px; } .label-left { left: -18px; }

        #combineBtn { padding: 12px 35px; font-size: 20px; font-weight: bold; cursor: pointer; background: var(--primary-color); color: white; border: none; border-radius: 50px; display: none; margin: 10px 0; z-index: 50; }
        #resetBtn { padding: 10px 20px; font-size: 16px; font-weight: bold; background: #e67e22; color: white; border: none; border-radius: 10px; cursor: pointer; }

        .monster-view { width: 100%; aspect-ratio: 1/1; max-width: 250px; position: relative; background: #fff; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); overflow: hidden; }
        .monster-layer { position: absolute; width: 100%; height: 100%; top: 0; left: 0; object-fit: contain; }
        
        #childPanel, #childCellPanel { visibility: hidden; opacity: 0; transition: 1s; }
        .dragging-disabled { pointer-events: none !important; }

        /* 針對 iPad 縱向的微調 */
        @media (max-width: 768px) {
            .cell { width: 180px; height: 180px; }
            .label { font-size: 16px; }
            .trait-legend { display: none; } /* 手機平板可隱藏或改按鈕彈出 */
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div style="font-weight: bold; color: var(--primary-color);">小怪獸遺傳實驗室</div>
        <button id="resetBtn" onclick="resetExperiment()">🔄 再生一次</button>
    </div>

    <div class="lab-container" id="mainLab">
        <div class="row">
            <div class="panel" id="dadPanel">
                <div class="label">爸爸 (2n)</div>
                <div id="dadCell" class="cell" ondragover="event.preventDefault()" ondrop="handleDrop(event, 'dad')"></div>
                <div class="gamete-container">
                    <div id="spermArea" class="sperm-shape" ondragover="event.preventDefault()" ondrop="handleDrop(event, 'dad')"></div>
                </div>
            </div>
            
            <div class="panel" id="childCellPanel">
                <div class="label">受精卵 (2n)</div>
                <div id="childCell" class="cell"></div>
            </div>

            <div class="panel" id="momPanel">
                <div class="label">媽媽 (2n)</div>
                <div id="momCell" class="cell" ondragover="event.preventDefault()" ondrop="handleDrop(event, 'mom')"></div>
                <div class="gamete-container">
                    <div id="eggArea" class="egg-shape" ondragover="event.preventDefault()" ondrop="handleDrop(event, 'mom')"></div>
                </div>
            </div>
        </div>

        <button id="combineBtn" onclick="startFertilization()">受精作用開始</button>

        <div class="row">
            <div class="panel">
                <div id="dadMonster" class="monster-view"></div>
                <div style="font-size:14px; font-weight:bold; color:var(--dad-color);">爸爸外型</div>
            </div>
            <div class="panel" id="childPanel">
                <div id="childMonster" class="monster-view"></div>
                <div style="font-size:14px; font-weight:bold; color:var(--primary-color);">小孩外型</div>
            </div>
            <div class="panel">
                <div id="momMonster" class="monster-view"></div>
                <div style="font-size:14px; font-weight:bold; color:var(--mom-color);">媽媽外型</div>
            </div>
        </div>
    </div>

<script>
    // 圖片路徑（請確保 GitHub 上檔名一致）
    const imgFiles = {
        bodyGreen: '體1.png', bodyYellow: '體2.png', wing: '翅膀.png',
        hand2: '手1.png', hand4: '手2.png', horn: '角.png',
        legYes: '腳2.png', legNo: '腳1.png', mark: '斑紋.png',
        eye2: '眼1.png', eye3: '眼2.png'
    };

    const dnaData = {
        dad: [
            {id:'d1a',size:'long',type:1,labels:['A','b','d'],color:'#3498db',x:25,y:55},
            {id:'d1b',size:'long',type:1,labels:['a','B','d'],color:'#85c1e9',x:50,y:55},
            {id:'d2a',size:'mid',type:2,labels:['e','F'],color:'#3498db',x:95,y:75},
            {id:'d2b',size:'mid',type:2,labels:['E','f'],color:'#85c1e9',x:120,y:75},
            {id:'d3a',size:'short',type:3,labels:['g','h'],color:'#3498db',x:165,y:90},
            {id:'d3b',size:'short',type:3,labels:['G','h'],color:'#85c1e9',x:185,y:90}
        ],
        mom: [
            {id:'m1a',size:'long',type:1,labels:['A','b','D'],color:'#e74c3c',x:25,y:55},
            {id:'m1b',size:'long',type:1,labels:['a','b','d'],color:'#f1948a',x:50,y:55},
            {id:'m2a',size:'mid',type:2,labels:['e','f'],color:'#e74c3c',x:95,y:75},
            {id:'m2b',size:'mid',type:2,labels:['e','F'],color:'#f1948a',x:120,y:75},
            {id:'m3a',size:'short',type:3,labels:['g','H'],color:'#e74c3c',x:165,y:90},
            {id:'m3b',size:'short',type:3,labels:['g','h'],color:'#f1948a',x:185,y:90}
        ]
    };

    function init() {
        spawnChromosomes('dad', 'dadCell');
        spawnChromosomes('mom', 'momCell');
        renderMonster('dadMonster', collectGenesFromDiv('dadCell'));
        renderMonster('momMonster', collectGenesFromDiv('momCell'));
    }

    function spawnChromosomes(side, containerId) {
        const container = document.getElementById(containerId);
        container.innerHTML = '';
        dnaData[side].forEach((d, index) => {
            const div = document.createElement('div');
            div.className = `chromosome ${d.size}`;
            div.id = d.id; div.draggable = true;
            div.style.backgroundColor = d.color;
            div.style.left = d.x+'px'; div.style.top = d.y+'px';
            div.dataset.genes = JSON.stringify(d.labels);
            div.dataset.side = side; div.dataset.type = d.type; 
            div.ondragstart = (e) => e.dataTransfer.setData('text', e.target.id);
            const labelClass = (index % 2 === 0) ? 'label-left' : 'label-right';
            d.labels.forEach(l => {
                const s = document.createElement('div'); s.className = 'gene-site';
                s.innerHTML = `<span class="gene-label ${labelClass}">${l}</span>`; div.appendChild(s);
            });
            container.appendChild(div);
        });
    }

    function handleDrop(e, side) {
        e.preventDefault();
        const id = e.dataTransfer.getData('text');
        const el = document.getElementById(id);
        if (!el || el.dataset.side !== side) return;
        
        const target = e.currentTarget;
        const cell = document.getElementById(side + 'Cell');

        if (target.id === 'spermArea' || target.id === 'eggArea') {
            const currentChrs = target.querySelectorAll('.chromosome');
            const newType = el.dataset.type;
            let typeExists = false;
            currentChrs.forEach(c => { if(c.dataset.type === newType) typeExists = true; });
            if (typeExists) { alert("配子中每一對同源染色體只能選擇一條！"); return; }
            
            const shadow = el.cloneNode(true);
            shadow.id = id + "_shadow";
            shadow.classList.add('faded');
            shadow.draggable = false;
            cell.appendChild(shadow);

            el.style.position = 'relative'; el.style.left = 'auto'; el.style.top = 'auto';
            target.appendChild(el);
            
            // 修正精子排列：當進去精子後，保持 type 排序
            const allInGamete = Array.from(target.querySelectorAll('.chromosome'));
            allInGamete.sort((a,b) => a.dataset.type - b.dataset.type);
            allInGamete.forEach(c => target.appendChild(c));

        } else if (target.className.includes('cell')) {
            const shadow = document.getElementById(id + "_shadow");
            if (shadow) shadow.remove();
            const d = dnaData[side].find(x => x.id === id);
            el.style.position = 'absolute'; el.style.left = d.x+'px'; el.style.top = d.y+'px';
            target.appendChild(el);
        }
        scanAll();
    }

    function scanAll() {
        const spermOk = document.getElementById('spermArea').children.length === 3;
        const eggOk = document.getElementById('eggArea').children.length === 3;
        document.getElementById('combineBtn').style.display = (spermOk && eggOk) ? 'block' : 'none';
    }

    function collectGenesFromDiv(divId) {
        let genes = [];
        const chrs = document.getElementById(divId).querySelectorAll('.chromosome:not(.faded)');
        chrs.forEach(c => genes = genes.concat(JSON.parse(c.dataset.genes)));
        return genes;
    }

    function startFertilization() {
        document.getElementById('combineBtn').style.display = 'none';
        document.getElementById('mainLab').classList.add('dragging-disabled');
        const sperm = document.getElementById('spermArea');
        const egg = document.getElementById('eggArea');
        const childCellPanel = document.getElementById('childCellPanel');
        const childCell = document.getElementById('childCell');
        const dadRect = document.getElementById('dadPanel').getBoundingClientRect();
        const momRect = document.getElementById('momPanel').getBoundingClientRect();
        const childRect = childCellPanel.getBoundingClientRect();
        const spermMoveX = childRect.left + childRect.width/2 - (dadRect.left + dadRect.width/2);
        const eggMoveX = childRect.left + childRect.width/2 - (momRect.left + momRect.width/2);

        sperm.style.transform = `translateX(${spermMoveX}px) rotate(90deg) scale(0.8)`;
        egg.style.transform = `translateX(${eggMoveX}px) scale(1.1)`;

        setTimeout(() => {
            sperm.style.opacity = '0';
            egg.style.transform = `translateX(${eggMoveX}px) scale(1.3)`;
            egg.style.backgroundColor = '#f1c40f';
        }, 1000);

        setTimeout(() => {
            egg.style.opacity = '0';
            childCellPanel.style.visibility = 'visible';
            childCellPanel.style.opacity = '1';
            
            // 合併並排序
            const spermChrs = Array.from(sperm.querySelectorAll('.chromosome'));
            const eggChrs = Array.from(egg.querySelectorAll('.chromosome'));
            const allChrs = [...spermChrs, ...eggChrs];
            allChrs.sort((a, b) => (a.dataset.type !== b.dataset.type) ? a.dataset.type - b.dataset.type : (a.dataset.side === 'dad' ? -1 : 1));

            allChrs.forEach((c, i) => {
                c.style.position = 'absolute'; c.style.transform = 'scale(0.9)';
                const pairIndex = Math.floor(i / 2); const offsetInPair = i % 2;
                c.style.left = (20 + pairIndex * 70 + offsetInPair * 25) + 'px';
                const offsetTop = c.classList.contains('long') ? 50 : (c.classList.contains('mid') ? 35 : 20);
                c.style.top = (110 - offsetTop) + 'px';
                const labels = c.querySelectorAll('.gene-label');
                labels.forEach(l => { l.style.left = '-18px'; l.style.right = 'auto'; });
                childCell.appendChild(c);
            });
            renderMonster('childMonster', collectGenesFromDiv('childCell'));
            document.getElementById('childPanel').style.visibility = 'visible';
            document.getElementById('childPanel').style.opacity = '1';
        }, 2000);
    }

    function resetExperiment() {
        document.getElementById('mainLab').classList.remove('dragging-disabled');
        document.getElementById('childCellPanel').style.cssText = "visibility: hidden; opacity: 0;";
        document.getElementById('childPanel').style.cssText = "visibility: hidden; opacity: 0;";
        document.getElementById('childCell').innerHTML = '';
        document.getElementById('spermArea').innerHTML = '';
        document.getElementById('eggArea').innerHTML = '';
        document.getElementById('childMonster').innerHTML = '';
        const sperm = document.getElementById('spermArea');
        const egg = document.getElementById('eggArea');
        sperm.style.cssText = "transform: rotate(90deg); opacity: 1;";
        egg.style.cssText = "transform: none; opacity: 1; background-color: rgba(255,255,255,0.8);";
        init();
        scanAll();
    }

    function renderMonster(containerId, genes) {
        const view = document.getElementById(containerId);
        view.innerHTML = '';
        const isDom = (g) => genes.includes(g.toUpperCase());
        if (!isDom('B')) addImg(view, imgFiles.wing);
        addImg(view, isDom('D') ? imgFiles.hand2 : imgFiles.hand4);
        addImg(view, isDom('F') ? imgFiles.legNo : imgFiles.legYes); 
        addImg(view, isDom('A') ? imgFiles.bodyGreen : imgFiles.bodyYellow);
        addImg(view, isDom('H') ? imgFiles.eye2 : imgFiles.eye3);
        if (isDom('E')) addImg(view, imgFiles.horn);
        if (!isDom('G')) addImg(view, imgFiles.mark);
    }

    function addImg(parent, src) {
        const img = document.createElement('img');
        img.src = src; img.className = `monster-layer`;
        img.onerror = () => { img.style.display = 'none'; };
        parent.appendChild(img);
    }
    init();
</script>
</body>
</html>
